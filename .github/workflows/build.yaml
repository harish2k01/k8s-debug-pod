name: Build Image

on:
  release:
    types:
      - published
  pull_request:
    paths:
      - Dockerfile
      - entrypoint.sh
      - .github/workflows/build.yaml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"

            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tag must use semantic versioning, for example v1.2.3 or 1.2.3." >&2
              exit 1
            fi

            major="${version%%.*}"
            minor_patch="${version#*.}"
            minor="${minor_patch%%.*}"

            tags="${image}:${version}"

            if [[ "$version" != *-* && "${{ github.event.release.prerelease }}" != "true" ]]; then
              tags="${tags}"$'\n'"${image}:${major}.${minor}"
              tags="${tags}"$'\n'"${image}:${major}"
              tags="${tags}"$'\n'"${image}:latest"
            fi
          else
            short_sha="${GITHUB_SHA::12}"
            tags="${image}:pr-${{ github.event.pull_request.number }}-${short_sha}"
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'release' }}
          provenance: false
          sbom: false
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Ubuntu-based Kubernetes debug pod toolbox
